s, fostering a connected global community rooted in faith and enlightened by knowledge.\",\"cta_story\":\"Our Full Story\",\"cta_dept\":\"Explore Departments\"},\"stats\":{\"branches\":\"Active Branches\",\"colleges\":\"Affiliated Colleges\",\"students\":\"Enrolled Students\",\"sermons\":\"Sermon Archive\",\"members\":\"Community Members\"},\"footer\":{\"motto\":\"Living by Faith, known by Love, and a voice of Hope\",\"links\":{\"home\":\"Home\",\"about\":\"About\",\"departments\":\"Departments\",\"sermons\":\"Events\",\"blog\":\"Blog\",\"library\":\"Books\",\"integration\":\"Integration\",\"contact\":\"Contact\",\"lms\":\"LMS Login\",\"donate\":\"Donate\"},\"copyright\":\"© 2025 Hamere Wengel Zethiopia. All rights reserved.\"},\"contact\":{\"hero_tag\":\"Get In Touch\",\"hero_title\":\"Contact Us\",\"hero_sub\":\"We would love to hear from you. Reach out through our contact form or visit one of our offices.\",\"form_title\":\"Send a Message\",\"first_name\":\"First Name\",\"last_name\":\"Last Name\",\"email_label\":\"Email Address\",\"phone_label\":\"Phone Number\",\"subject\":\"Subject\",\"message\":\"Message\",\"placeholder\":\"Tell us how we can help you…\",\"submit\":\"Send Message\",\"info_title\":\"Contact Information\",\"address\":\"Bole Sub-City, Addis Ababa, Ethiopia\",\"phone\":\"+251 11 123 4567\",\"email\":\"info@hamerewengel.org\",\"social\":\"@HamereWengelZethiopia\",\"map_title\":\"Find Us\",\"hours_title\":\"Office Hours\",\"hours_weekday\":\"Monday – Friday: 8:30 AM – 5:30 PM\",\"hours_saturday\":\"Saturday: 9:00 AM – 1:00 PM\",\"hours_sunday\":\"Sunday: Closed\"},\"zsections\":{\"heritage\":{\"tag\":\"Our Sacred Heritage\",\"title\":\"A Legacy of Truth\",\"body\":\"Rooted in the profound traditions of Ethiopian spiritual life, we preserve the sacred teachings that have guided generations. Our mission is to ensure these truths remain accessible to all, anywhere in the world.\",\"link\":\"Discover Our Heritage\"},\"academy\":{\"tag\":\"The Digital Academy\",\"title\":\"Excellence in Theological Education\",\"body\":\"From foundational Diplomas to advanced Master's degrees, our integrated Learning Management System provides a rigorous academic environment. Study at your own pace with resources curated by world-class faculty.\",\"link\":\"Explore Programs\"},\"outreach\":{\"tag\":\"Global Outreach \u0026 Dioceses\",\"title\":\"A Connected Community\",\"body\":\"Navigate our global network through our hierarchical structure from the General Secretariat to regional Dioceses and local Wereda offices. We are one body, unified in mission.\",\"link\":\"View Our Network\"}},\"about\":{\"history_tag\":\"Our History\",\"history_title\":\"Preserving the Sacred, Embracing the Future\",\"history_p1\":\"Hamere Wongel Ze-Ethiopia is a spiritual association established based on a reformative calling, recognizing that God is the source of spiritual vision and mission. Guided by the Great Commission given by our Lord and Savior Jesus Christ (Matt. 28:19-20, Acts 1:8), the association is striving to widely disseminate the Gospel through which our people are saved from sin and eternal death. Founded on June 24, 2006 (E.C.) in Addis Ababa, this association is legally recognized by the Ministry of Federal Affairs under registration number ፌ.ጉ.ሚ 00500.\",\"history_p2\":\"Through decades of prayer, study, and community service, we have built a network of dioceses, colleges, and outreach programs that span from the highlands of Tigray to the valleys of the Rift. Each branch carries the same sacred flame — the conviction that truth, faith, and learning belong to every person, regardless of geography.\",\"history_p3\":\"Today, Hamere Wengel Zethiopia stands at the threshold of a new era. By uniting our ancient heritage with a bold digital vision — a comprehensive Learning Management System, a digital library of over 10,000 resources, and live-streamed services — we are ensuring that the light of our tradition shines without borders.\",\"
